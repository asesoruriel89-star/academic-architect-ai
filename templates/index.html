<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Académico AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #loading { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">Generador de Tesis / Ensayos</h2>
                    <form action="/generate" method="POST" onsubmit="showLoading()">
                        <div class="mb-3">
                            <label class="form-label">Tema de investigación:</label>
                            <input type="text" name="topic" class="form-control" placeholder="Ej: Inteligencia Artificial en el Derecho" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de documento:</label>
                            <select name="type" class="form-select">
                                <option value="Tesis">Tesis Completa</option>
                                <option value="Capitulo de Libro">Capítulo de Libro</option>
                                <option value="Ensayo Academico">Ensayo Académico</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Generar y Descargar Word</button>
                    </form>
                    <div id="loading" class="text-center mt-3">
                        <div class="spinner-border text-primary"></div>
                        <p>Redactando documento... por favor espera.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function showLoading() { document.getElementById('loading').style.display = 'block'; }
    </script>
</body>
</html>
